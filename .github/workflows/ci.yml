name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: PHP ${{ matrix.php }} — syntax + unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP syntax check (php -l)
        run: |
          set -e
          find . -path ./vendor -prune -o -path ./node_modules -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 php -l > /tmp/phpl.out 2>&1 \
            || { cat /tmp/phpl.out; exit 1; }
          grep -v '^No syntax errors' /tmp/phpl.out || true

      - name: Run PHPUnit
        run: composer run test

      # Surface CVE advisories on composer dependencies. Non-blocking : `composer audit`
      # exits non-zero on any advisory (including dev-deps that don't ship), and we
      # don't want a transitive low-severity CVE to block all releases. The output
      # stays visible in the run logs ; Dependabot (when enabled) is the continuous
      # signal. See SECURITY.md.
      - name: composer audit (CVE check, informational)
        if: matrix.php == '8.1'
        run: composer audit || true

  lint:
    name: WordPress Coding Standards (PHPCS)
    runs-on: ubuntu-latest
    # PHPCS is BLOCKING : the codebase is fully WPCS-clean as of v0.9.3 (relaxed
    # cosmetic rules on modern PHP idioms but every Security/SQL/i18n category
    # still strict). See phpcs.xml.dist for the rationale.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2, cs2pr

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-8.1-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-8.1-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS (annotated, blocking)
        run: ./vendor/bin/phpcs --standard=phpcs.xml.dist --report-full --report-checkstyle=/tmp/phpcs.xml

      - name: Annotate PR with PHPCS findings
        if: always()
        run: cs2pr --graceful-warnings /tmp/phpcs.xml || true

  plugin-check:
    name: WordPress.org Plugin Check
    runs-on: ubuntu-latest
    # Runs the same automated checks as the wordpress.org reviewers (plugin headers,
    # i18n, late-escaping, deprecated functions, internationalization, etc.). Must
    # stay green : a failure here is the same as a future wordpress.org rejection.
    #
    # Plugin Check scans the BUILT plugin folder (matching what would actually ship
    # in the .zip), not the raw repo — otherwise it flags every dev-only file
    # (.claude/, .github/, tests/, docs/, CLAUDE.md, composer.json…) which would
    # never reach a wp.org installer anyway.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin folder (mirrors release.yml's rsync)
        # Same exclusion list as release.yml so what we scan = what ships.
        # If you update one, update the other.
        run: |
          mkdir -p build/ab-testing-wordpress
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.wordpress-org' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='tasks' \
            --exclude='docs' \
            --exclude='SECURITY.md' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='*.lock' \
            --exclude='*.dist' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='CLAUDE.md' \
            --exclude='.wp-env.json' \
            --exclude='.gitignore' \
            --exclude='.phpunit.result.cache' \
            --exclude='*.zip' \
            --exclude='test*.html' \
            --exclude='/tools/' \
            ./ build/ab-testing-wordpress/

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: './build/ab-testing-wordpress'
          wp-version: 'latest'
          # Codes we knowingly suppress, with rationale :
          #   - WordPress.WP.AlternativeFunctions.rand_*       : mt_rand/srand for variant pick (speed > crypto, see Cookie.php)
          #   - WordPress.WP.AlternativeFunctions.file_system_*: zip extraction streams + local-disk reads on plugin-controlled paths
          #   - WordPress.DB.DirectDatabaseQuery.*             : we own a custom table (wp_abtest_events), no WP API alternative
          #   - WordPress.DB.SlowDBQuery.*                     : intentional meta_query for experiment lookup
          #   - PluginCheck.Security.DirectDB.UnescapedDBParameter : false positive on $table from Schema::events_table()
          #   - WordPress.NamingConventions.PrefixAllGlobals.NonPrefixedHooknameFound : we hook into core actions like `init`
          #   - PluginCheck.CodeAnalysis.DiscouragedFunctions.load_plugin_textdomainFound : addressed at load time but Plugin Check still emits
          ignore-codes: 'WordPress.WP.AlternativeFunctions.rand_seeding_mt_srand,WordPress.WP.AlternativeFunctions.rand_mt_rand,WordPress.WP.AlternativeFunctions.file_system_operations_fopen,WordPress.WP.AlternativeFunctions.file_system_operations_fclose,WordPress.WP.AlternativeFunctions.file_system_operations_fwrite,WordPress.WP.AlternativeFunctions.file_system_operations_fread,WordPress.WP.AlternativeFunctions.file_system_operations_feof,WordPress.WP.AlternativeFunctions.file_system_operations_file_put_contents,WordPress.WP.AlternativeFunctions.file_get_contents_file_get_contents,WordPress.DB.DirectDatabaseQuery.DirectQuery,WordPress.DB.DirectDatabaseQuery.NoCaching,WordPress.DB.DirectDatabaseQuery.SchemaChange,WordPress.DB.SlowDBQuery.slow_db_query_meta_query,WordPress.DB.SlowDBQuery.slow_db_query_meta_key,WordPress.DB.SlowDBQuery.slow_db_query_meta_value,PluginCheck.Security.DirectDB.UnescapedDBParameter,WordPress.NamingConventions.PrefixAllGlobals.NonPrefixedHooknameFound,trademarked_term'
