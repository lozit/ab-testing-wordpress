name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: PHP ${{ matrix.php }} — syntax + unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-${{ matrix.php }}-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP syntax check (php -l)
        run: |
          set -e
          find . -path ./vendor -prune -o -path ./node_modules -prune -o -name '*.php' -print0 \
            | xargs -0 -n1 php -l > /tmp/phpl.out 2>&1 \
            || { cat /tmp/phpl.out; exit 1; }
          grep -v '^No syntax errors' /tmp/phpl.out || true

      - name: Run PHPUnit
        run: composer run test

  lint:
    name: WordPress Coding Standards (PHPCS)
    runs-on: ubuntu-latest
    # PHPCS is informational for now — we surface violations without failing the build.
    # Flip this to false once the codebase is fully WPCS-clean.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2, cs2pr

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-8.1-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-8.1-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run PHPCS (annotated)
        run: ./vendor/bin/phpcs --standard=phpcs.xml.dist --report-full --report-checkstyle=/tmp/phpcs.xml || true

      - name: Annotate PR with PHPCS findings
        if: always()
        run: cs2pr --graceful-warnings /tmp/phpcs.xml || true
