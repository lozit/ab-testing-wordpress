name: Release

# Triggered when a version tag is pushed (e.g. `git tag v0.4.0 && git push origin v0.4.0`).
# Builds a clean WordPress-ready zip and attaches it to a GitHub Release with auto-generated notes.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for changelog generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"        # e.g. v0.4.0
          VERSION="${TAG#v}"                     # e.g. 0.4.0
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing tag=$TAG version=$VERSION"

      - name: Sanity check — plugin header version matches tag
        run: |
          HEADER_VERSION=$(grep -E "^\s\*\s+Version:\s+" uplift-ab-testing.php | awk '{print $3}' | tr -d '\r\n ')
          if [ "$HEADER_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Plugin header version ($HEADER_VERSION) does not match tag (${{ steps.version.outputs.version }})."
            echo "Bump 'Version:' in uplift-ab-testing.php to ${{ steps.version.outputs.version }} and re-tag."
            exit 1
          fi
          echo "Plugin header version matches: $HEADER_VERSION ✓"

      - name: Sanity check — security audit report mentions this version
        # Forces every release to either re-run /security-audit (regenerating
        # docs/security/latest.md) or to add an explicit "no security delta from
        # vX.Y.Z" note. Stops the release if the security trail is stale.
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [ ! -f docs/security/latest.md ]; then
            echo "::error::docs/security/latest.md is missing. Run /security-audit before tagging."
            exit 1
          fi
          if ! grep -qE "v${VERSION}([^0-9]|$)" docs/security/latest.md; then
            echo "::error::docs/security/latest.md does not mention v${VERSION}."
            echo "Either re-run /security-audit (recommended) or add a one-line"
            echo "'No security delta vs v<previous>' note to docs/security/latest.md"
            echo "and the matching docs/security/audit-YYYY-MM-DD-v${VERSION}.md archive."
            exit 1
          fi
          echo "Security audit report mentions v${VERSION} ✓"

      - name: Build distribution folder
        run: |
          mkdir -p build/uplift-ab-testing
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.claude' \
            --exclude='.wordpress-org' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='tasks' \
            --exclude='docs' \
            --exclude='SECURITY.md' \
            --exclude='build' \
            --exclude='dist' \
            --exclude='*.lock' \
            --exclude='*.dist' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='CLAUDE.md' \
            --exclude='.wp-env.json' \
            --exclude='.gitignore' \
            --exclude='.phpunit.result.cache' \
            --exclude='*.zip' \
            --exclude='test*.html' \
            --exclude='/tools/' \
            --exclude='wp-tests-config.php' \
            --exclude='phpunit.xml*' \
            --exclude='phpcs.xml*' \
            ./ build/uplift-ab-testing/
          echo "--- Bundle contents (top level) ---"
          ls -la build/uplift-ab-testing/
          echo "--- File count ---"
          find build/uplift-ab-testing/ -type f | wc -l

      - name: Create zip
        run: |
          cd build
          zip -r "../uplift-ab-testing-${{ steps.version.outputs.version }}.zip" uplift-ab-testing
          cd ..
          ls -lh uplift-ab-testing-${{ steps.version.outputs.version }}.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            uplift-ab-testing-${{ steps.version.outputs.version }}.zip
